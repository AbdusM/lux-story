name: Overlay Perf Benchmarks

on:
  workflow_dispatch:

jobs:
  overlay-perf:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run overlay performance lane
      run: |
        ulimit -n 4096 || true
        npx playwright test --project=overlay-perf --workers=1
      env:
        CI: true
        ADMIN_API_TOKEN: admin
        PLAYWRIGHT_CONSTRAINED: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: overlay-perf-test-results
        path: test-results/
        retention-days: 14

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: overlay-perf-playwright-report
        path: playwright-report/
        retention-days: 14
